name: Build Plugin

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [created]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21 Zulu
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "zulu"

            - name: Add NightExpress Maven Repo
              run: |
                mkdir -p ~/.m2
                cat > ~/.m2/settings.xml << 'EOF'
<settings>
  <repositories>
    <repository>
      <id>nightexpress-releases</id>
      <url>https://repo.nightexpressdev.com/releases</url>
    </repository>
  </repositories>
</settings>
EOF

            - name: Build Maven
              run: mvn -B clean package -DskipTests

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Plugin
                  path: target/*.jar

            - name: Upload to release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: target/*.jar
